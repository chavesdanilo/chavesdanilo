<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danilo Chaves - Portfólio</title>
  
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <style>
    /* Configurações Globais baseadas no index.css */
    :root {
      --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    ::selection {
      background-color: #333333;
      color: #ffffff;
    }
    html {
      scroll-behavior: smooth;
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #000000;
    }
    ::-webkit-scrollbar-thumb {
      background: #333333;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555555;
    }

    /* Sistema de Animações (Substituindo o Framer Motion) */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Efeitos do Hero */
    @keyframes pulse-light-1 {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.2); opacity: 0.3; }
    }
    @keyframes pulse-light-2 {
      0%, 100% { transform: scale(1); opacity: 0.1; }
      50% { transform: scale(1.3); opacity: 0.2; }
    }
    .animate-pulse-1 { animation: pulse-light-1 10s ease-in-out infinite; }
    .animate-pulse-2 { animation: pulse-light-2 15s ease-in-out infinite 2s; }
    
    @keyframes bounce-scroll {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
    .animate-bounce-custom { animation: bounce-scroll 2s ease-in-out infinite; }

    /* Estilos do Carrossel */
    .carousel-track {
      overflow: hidden;
      scroll-snap-type: x mandatory;
    }
    .carousel-slides {
      display: flex;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .carousel-slide {
      flex-shrink: 0;
      w-full;
      scroll-snap-align: start;
    }
    .carousel-dot {
      transition: all 0.3s ease;
    }
    .carousel-dot[data-active="true"] {
      transform: scale(1.3);
    }
  </style>
</head>
